# Default configuration for Kiro Ception
# Copy to ~/.config/kiro-ception/config.toml to customize

[sources.cli]
enabled = true
# SQLite database path - first existing path wins
paths = [
    "~/Library/Application Support/kiro-cli/data.sqlite3",
    "~/.local/share/kiro-cli/data.sqlite3",
    "~/AppData/Roaming/kiro-cli/data.sqlite3",
]

[sources.ide]
enabled = true
# Glob patterns for .chat files - first existing pattern wins
patterns = [
    "~/Library/Application Support/Kiro/User/globalStorage/kiro.kiroagent/*/*.chat",
    "~/.config/Kiro/User/globalStorage/kiro.kiroagent/*/*.chat",
    "~/AppData/Roaming/Kiro/User/globalStorage/kiro.kiroagent/*/*.chat",
]

[embedding]
# Backend: "sentence-transformers" (default, local) or "openai-compatible" (Ollama, LM Studio, OpenAI, etc.)
backend = "sentence-transformers"
model = "all-MiniLM-L6-v2"
cache_dir = "~/.cache/kiro-ception"

# OpenAI-compatible backend settings (only used when backend = "openai-compatible")
# api_base = "http://localhost:11434/v1"  # Ollama default
# api_base = "http://localhost:1234/v1"   # LM Studio default
# api_base = "https://api.openai.com/v1"  # OpenAI
# api_key = ""                            # Required for hosted providers, optional for local
# dimensions = 1024                       # Output dimensions (omit for model default)

# Example: Ollama with qwen3-embedding:4b
# backend = "openai-compatible"
# model = "qwen3-embedding:4b"
# api_base = "http://localhost:11434/v1"
# dimensions = 1024
# batch_size = 1  # 1 us recommended for large/gpu models, higher for small/fast models, typically a max of 16 for LLMs.  The default is 16

# Example: OpenAI text-embedding-3-large
# backend = "openai-compatible"
# model = "text-embedding-3-large"
# api_base = "https://api.openai.com/v1"
# api_key = "sk-..."
# dimensions = 1024

[search]
default_threshold = 0.2
default_max_results = 10
default_context_window = 3
# Recency floor: the minimum score multiplier applied to the oldest message.
# The halflife is auto-calculated so the oldest message in your history gets
# exactly this multiplier. Recent messages get ~1.0, older ones decay smoothly
# toward this floor. Set to 1.0 to disable recency boosting entirely.
recency_floor = 0.85
# Override the workspace directory used by search_project_history.
# When set, search_project_history scopes results to this path.
# When empty (default), auto-detected from the Kiro IDE/CLI environment.
# Useful if auto-detection doesn't pick up your workspace correctly.
# workspace_dir = "~/projects/my-main-project"

[memory]
# Fraction of RAM to use for index (0.33 = 1/3)
fraction = 0.33
# Uncomment to set explicit limit in MB instead of fraction
# limit_mb = 512
# Set to 0 to disable the memory limit entirely (use all available RAM)
# limit_mb = 0

[indexing]
# Milliseconds to sleep between embedding batches (0 = full speed)
# Set higher (e.g., 500-2000) to reduce GPU load during active use
throttle_ms = 0
# Minutes between automatic rescans for new/changed sessions (0 = disabled)
# The indexer rescans conversation files periodically to pick up new messages
rescan_interval_minutes = 10

[server]
# Localhost-only port for leader-follower inter-process communication
# Only one instance (the leader) binds this port; followers connect to it
# This and the leader-follower pattern is needed to prevent each process from having its own in-memory cache wasting resources
leader_port = 19742

[peers]
# Cross-machine peer federation (disabled by default)
# When enabled, search queries are fanned out to remote kiro-ception instances
# and results are merged. Each machine maintains its own independent index.
enabled = false

# List of peer addresses (host:port)
# These are other machines running kiro-ception that you want to search
# nodes = ["192.168.1.50:19742", "workpc.tailscale:19742"]
nodes = []

# Shared passphrase for encrypting peer traffic (optional)
# When set, all inter-peer communication is encrypted with AES-256-GCM
# (key derived via Argon2id). Both peers must use the same passphrase.
# Leave empty for unencrypted communication (fine on trusted networks / VPNs)
secret = ""

# Per-peer request timeout in seconds
# If a peer doesn't respond within this time, its results are skipped
timeout_seconds = 5

# Enable the search_peer_history debug tool (default: false)
# When true (and peers are enabled), exposes an extra MCP tool that searches
# only remote peers without including local results. Requires Kiro restart.
# debug_tool_enabled = true
